<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image — 1200x630</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #08080c;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e8e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background glow */
    body::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
    }

    .card {
      display: flex;
      align-items: center;
      gap: 60px;
      padding: 0 80px;
      position: relative;
      z-index: 1;
    }

    .card-left { flex: 1; }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .gradient {
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 50%, #B8A0D2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 20px;
      color: #9898b0;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 8px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #818cf8;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .format-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .fmt {
      padding: 10px 20px;
      background: #12121c;
      border: 1px solid #1a1a2a;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: #e8e8f0;
    }

    .by-mezamii {
      position: absolute;
      bottom: 30px;
      right: 80px;
      font-size: 15px;
      color: #9898b0;
    }
    .by-mezamii span { color: #B8A0D2; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-left">
      <!-- Use the generated icon PNG here -->
      <img class="card-icon" src="../src/assets/icon-64.png" alt="">
      <h1>Video Converter Pro<br><span class="gradient">Free &amp; Portable</span></h1>
      <p class="subtitle">Convert between 20+ formats. Batch processing,<br>device profiles, smart compression.</p>
      <div class="badges">
        <span class="badge">20+ Formats</span>
        <span class="badge">Batch Convert</span>
        <span class="badge">Device Profiles</span>
        <span class="badge">No Install</span>
      </div>
    </div>
    <div class="card-right">
      <div class="format-grid">
        <div class="fmt">MP4</div>
        <div class="fmt">MKV</div>
        <div class="fmt">AVI</div>
        <div class="fmt">MOV</div>
        <div class="fmt">WebM</div>
        <div class="fmt">MP3</div>
        <div class="fmt">WMV</div>
        <div class="fmt">GIF</div>
        <div class="fmt">AAC</div>
      </div>
    </div>
  </div>
  <div class="by-mezamii">by <span>Mezamii</span></div>
</body>
</html>
