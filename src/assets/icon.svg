<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>

  <!-- Film frame with rounded corners -->
  <rect x="88" y="120" width="336" height="240" rx="24" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.25"/>

  <!-- Film sprocket holes - top row -->
  <rect x="104" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="136" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="168" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="328" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="360" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="392" y="130" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>

  <!-- Film sprocket holes - bottom row -->
  <rect x="104" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="136" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="168" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="328" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="360" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>
  <rect x="392" y="338" width="16" height="12" rx="3" fill="#6366f1" opacity="0.2"/>

  <!-- Glow behind play button -->
  <circle cx="256" cy="240" r="72" fill="#6366f1" opacity="0.08" filter="url(#glow)"/>

  <!-- Play button circle -->
  <circle cx="256" cy="240" r="64" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.6"/>

  <!-- Play triangle -->
  <polygon points="238,205 238,275 290,240" fill="url(#accent)"/>

  <!-- Conversion arrows - bottom right -->
  <g transform="translate(340, 380)" filter="url(#glow)">
    <!-- Arrow 1: top-right pointing -->
    <path d="M0,24 L36,24" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <polyline points="28,16 36,24 28,32" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrow 2: bottom-left pointing -->
    <path d="M52,40 L16,40" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <polyline points="24,32 16,40 24,48" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Format text hints -->
  <g font-family="'Segoe UI', sans-serif" font-weight="700" font-size="22" opacity="0.35">
    <text x="108" y="410" fill="url(#accent)">MP4</text>
    <text x="188" y="410" fill="url(#accent2)">MKV</text>
    <text x="268" y="410" fill="url(#accent)">AVI</text>
  </g>
</svg>